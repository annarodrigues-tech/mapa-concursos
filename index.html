<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar de Concursos — Gran</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --red:    #C0392B;
  --green:  #3BAE8A;
  --blue:   #4B7BE5;
  --purple: #1e40af;
  --orange: #9b2226;
  --gray:   #9CA3AF;
  --bg:     #F8F9FC;
  --white:  #FFFFFF;
  --border: #E5E9F0;
  --text:   #1A1F2E;
  --text2:  #6B7280;
  --text3:  #9CA3AF;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --r: 12px;
}
 
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
 
/* ── HEADER ──────────────────────────────── */
header {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 52px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
 
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
 
.logo-icon {
  width: 32px; height: 32px;
  background: var(--red);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
 
.logo-text {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
}
.logo-text small {
  display: block;
  font-size: 0.6rem;
  font-weight: 400;
  color: var(--text3);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
 
.header-center {
  flex: 1;
  display: flex;
  justify-content: center;
}
 
.counter-pill {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(248,249,252,0.9);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 0.8rem;
  backdrop-filter: blur(8px);
}
 
.counter-item { display: flex; align-items: center; gap: 5px; }
.counter-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.counter-item .dot.live { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.counter-item strong { font-weight: 700; color: var(--text); }
.counter-item span   { color: var(--text2); }
.counter-sep { width: 1px; height: 14px; background: var(--border); }
 
/* ── MAP ─────────────────────────────────── */
#map {
  position: absolute;
  top: 52px; left: 0; right: 0; bottom: 0;
  z-index: 1;
}
 
/* ── FLOATING SEARCH + FILTERS ───────────── */
.float-search {
  position: absolute;
  top: 68px;
  left: 16px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 0;
  width: 300px;
}
 
.search-box {
  display: flex;
  align-items: center;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
}
 
.search-input {
  flex: 1;
  padding: 11px 14px;
  border: none;
  background: transparent;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
}
.search-input::placeholder { color: var(--text3); }
 
.search-btn {
  padding: 11px 14px;
  background: transparent;
  border: none;
  border-left: 1px solid var(--border);
  cursor: pointer;
  color: var(--purple);
  font-size: 15px;
  transition: background .15s;
}
.search-btn:hover { background: var(--bg); }
 
/* ── FILTER BUTTON (top right) ───────────── */
.filter-float-btn {
  position: absolute;
  top: 68px;
  right: 16px;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all .2s;
}
.filter-float-btn:hover { border-color: var(--purple); color: var(--purple); }
.filter-float-btn.active { background: var(--purple); border-color: var(--purple); color: white; }
 
/* ── FILTER PANEL ────────────────────────── */
.filter-panel {
  position: absolute;
  top: 68px;
  right: 16px;
  z-index: 600;
  width: 280px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  display: none;
  flex-direction: column;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
}
.filter-panel.open { display: flex; }
 
.fp-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
 
.fp-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 18px;
  line-height: 1;
  padding: 0;
}
.fp-close:hover { color: var(--text); }
 
.fp-location {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text2);
}
.fp-location strong { color: var(--text); }
 
.fp-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.fp-section:last-child { border-bottom: none; }
 
.fp-section-title {
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--text);
  margin-bottom: 10px;
}
 
.fp-check {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 5px 0;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--text2);
  transition: color .15s;
}
.fp-check:hover { color: var(--text); }
.fp-check input[type="checkbox"] {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  accent-color: var(--purple);
}
 
.fp-uf {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
 
/* ── CARD POPUP ──────────────────────────── */
.card-popup {
  position: absolute;
  top: 68px;
  right: 16px;
  z-index: 700;
  width: 320px;
  background: var(--white);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: none;
  flex-direction: column;
  overflow: hidden;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
}
.card-popup.open { display: flex; }
 
.cp-close {
  position: absolute;
  top: 10px; right: 10px;
  width: 26px; height: 26px;
  background: var(--bg);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.cp-close:hover { background: var(--border); color: var(--text); }
 
.cp-tags {
  display: flex;
  gap: 6px;
  padding: 14px 14px 0;
  flex-wrap: wrap;
}
 
.cp-tag {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
}
.cp-tag.aberto   { background: #E8F8F3; color: var(--green); }
.cp-tag.encerrado{ background: #F3F4F6; color: var(--gray); }
.cp-tag.previsto { background: #EFF3FF; color: var(--blue); }
.cp-tag.area     { background: #F3F4F6; color: var(--text2); border: 1px solid var(--border); }
 
.cp-title {
  padding: 8px 14px 4px;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
 
.cp-org {
  padding: 0 14px 12px;
  font-size: 0.78rem;
  color: var(--text2);
}
 
.cp-info-card {
  margin: 0 14px 10px;
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
 
.cp-info-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
 
.cp-info-icon {
  width: 28px; height: 28px;
  background: var(--white);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
 
.cp-info-label {
  font-size: 0.68rem;
  color: var(--text3);
  margin-bottom: 2px;
}
 
.cp-info-value {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
 
.cp-article {
  margin: 0 14px 14px;
  background: var(--bg);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
 
.cp-article-icon {
  width: 40px; height: 40px;
  background: var(--purple);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
 
.cp-article-label {
  font-size: 0.68rem;
  color: var(--text3);
  margin-bottom: 3px;
}
 
.cp-article-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 10px;
}
 
.cp-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 10px;
  background: var(--purple);
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .15s;
}
.cp-btn:hover { opacity: .88; }
 
/* ── LEGEND ──────────────────────────────── */
.legend {
  position: absolute;
  bottom: 24px;
  left: 16px;
  z-index: 500;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 13px;
  box-shadow: var(--shadow-sm);
}
.legend-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 7px; }
.li { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; color: var(--text2); margin-bottom: 4px; }
.li:last-child { margin-bottom: 0; }
.ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
 
/* ── LEAFLET OVERRIDES ───────────────────── */
.leaflet-div-icon-clean, .cluster-icon { background: transparent !important; border: none !important; }
.leaflet-control-zoom a { background: var(--white) !important; border-color: var(--border) !important; color: var(--text2) !important; }
.leaflet-control-zoom a:hover { background: var(--bg) !important; color: var(--purple) !important; }
.leaflet-control-attribution { background: rgba(255,255,255,.85) !important; color: var(--text3) !important; font-size: 0.6rem !important; }
</style>
</head>

  <div class="fp-location">Local: <strong>Brasil</strong></div>
 
  <div class="fp-section">
    <div class="fp-section-title">Situação</div>
    <label class="fp-check"><input type="checkbox" value="aberto" onchange="updateFilters()"> Inscrições abertas</label>
    <label class="fp-check"><input type="checkbox" value="previsto" onchange="updateFilters()"> Edital em breve</label>
    <label class="fp-check"><input type="checkbox" value="encerrado" onchange="updateFilters()"> Inscrições encerradas</label>
    <label class="fp-check"><input type="checkbox" value="outros" onchange="updateFilters()"> Sem previsão</label>
  </div>
 
  <div class="fp-section">
    <div class="fp-section-title">Área</div>
    <label class="fp-check"><input type="checkbox" value="Policial" onchange="updateFilters()"> Policial</label>
    <label class="fp-check"><input type="checkbox" value="Controle" onchange="updateFilters()"> Controle e Gestão</label>
    <label class="fp-check"><input type="checkbox" value="Educação" onchange="updateFilters()"> Educação</label>
    <label class="fp-check"><input type="checkbox" value="Fiscal" onchange="updateFilters()"> Fiscal</label>
    <label class="fp-check"><input type="checkbox" value="Jurídica" onchange="updateFilters()"> Jurídica</label>
    <label class="fp-check"><input type="checkbox" value="Bancária" onchange="updateFilters()"> Bancária e Financeira</label>
    <label class="fp-check"><input type="checkbox" value="Legislativa" onchange="updateFilters()"> Legislativa</label>
    <label class="fp-check"><input type="checkbox" value="Administrativa" onchange="updateFilters()"> Administrativa</label>
    <label class="fp-check"><input type="checkbox" value="Saúde" onchange="updateFilters()"> Saúde</label>
    <label class="fp-check"><input type="checkbox" value="TI" onchange="updateFilters()"> Tecnologia da Informação</label>
    <label class="fp-check"><input type="checkbox" value="Militar" onchange="updateFilters()"> Militar</label>
    <label class="fp-check"><input type="checkbox" value="Tribunais" onchange="updateFilters()"> Tribunais</label>
  </div>
 
  <div class="fp-section">
    <div class="fp-section-title">Estado</div>
    <select class="fp-uf" id="fp-uf" onchange="updateFilters()">
      <option value="all">Todos os estados</option>
      <option value="NAC">Nacional (Federal)</option>
      <option value="AC">Acre</option><option value="AL">Alagoas</option>
      <option value="AM">Amazonas</option><option value="AP">Amapá</option>
      <option value="BA">Bahia</option><option value="CE">Ceará</option>
      <option value="DF">Distrito Federal</option><option value="ES">Espírito Santo</option>
      <option value="GO">Goiás</option><option value="MA">Maranhão</option>
      <option value="MG">Minas Gerais</option><option value="MS">Mato Grosso do Sul</option>
      <option value="MT">Mato Grosso</option><option value="PA">Pará</option>
      <option value="PB">Paraíba</option><option value="PE">Pernambuco</option>
      <option value="PI">Piauí</option><option value="PR">Paraná</option>
      <option value="RJ">Rio de Janeiro</option><option value="RN">Rio Grande do Norte</option>
      <option value="RO">Rondônia</option><option value="RR">Roraima</option>
      <option value="RS">Rio Grande do Sul</option><option value="SC">Santa Catarina</option>
      <option value="SE">Sergipe</option><option value="SP">São Paulo</option>
      <option value="TO">Tocantins</option>
    </select>
  </div>
</div>
 
<!-- CARD POPUP -->
<div class="card-popup" id="card-popup">
  <button class="cp-close" onclick="closeCard()">✕</button>
  <div class="cp-tags" id="cp-tags"></div>
  <div class="cp-title" id="cp-title"></div>
  <div class="cp-org" id="cp-org"></div>
  <div class="cp-info-card" id="cp-info"></div>
  <div class="cp-article" id="cp-article" style="display:none"></div>
</div>
 
<!-- LEGEND -->
<div class="legend">
  <div class="legend-title">Situação</div>
  <div class="li"><div class="ld" style="background:var(--green)"></div> Inscrições abertas</div>
  <div class="li"><div class="ld" style="background:var(--blue)"></div> Previstas</div>
  <div class="li"><div class="ld" style="background:#1e40af"></div> Sem previsão</div>
  <div class="li"><div class="ld" style="background:#9b2226"></div> Encerradas</div>
  <div class="li"><div class="ld" style="background:var(--gray)"></div> Outras</div>
</div>
 
<script>
// ── CONFIG ─────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbw3J08AdwN440HQT83eu-4XcvWNNDdH1VfkgqvVKw_sPjdAXVb-WiLZJE5pbVUClNMP5Q/exec';
 
// ── STATE ───────────────────────────────────
let all = [], cluster, map;
let filters = { situacoes: [], areas: [], uf: 'all', search: '' };
 
// ── HELPERS ─────────────────────────────────
const days = d => d ? Math.ceil((new Date(d) - new Date()) / 86400000) : null;
const fmt  = n => (+n||0).toLocaleString('pt-BR');
const fd   = d => { if(!d) return '—'; const p = d.slice(0,10).split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : '—'; };
 
function sitClass(s) {
  const v = (s||'').toLowerCase().trim();
  const ab = ['inscrições abertas','edital publicado','autorizado','regulamento publicado','prorrogado'];
  const pr = ['previsto','previsto loa','previsto ploa','anunciado','banca definida','banca em definição','comissão formada','solicitado','estudos em andamento','grupo de trabalho','recomendado pelo tce'];
  const en = ['inscrições encerradas'];
  if (ab.some(x => v === x)) return 'aberto';
  if (pr.some(x => v === x)) return 'previsto';
  if (en.some(x => v === x)) return 'encerrado';
  return 'outros';
}
 
function sitColor(sit) {
  const s = sitClass(sit);
  if (s==='aberto')    return '#3BAE8A';
  if (s==='previsto')  return '#4B7BE5';
  if (s==='encerrado') return '#9b2226';
  return '#1e40af';
}
 
function normArea(a) {
  if (!a) return '';
  const s = a.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (/^admin|^gestao|prefeit/.test(s)) return 'Administrativa';
  if (/educa/.test(s)) return 'Educação';
  if (/polici|seguranca pub/.test(s)) return 'Policial';
  if (/saude|enferma|farmac|odonto/.test(s)) return 'Saúde';
  if (/juridic|funcoes essenciais/.test(s)) return 'Jurídica';
  if (/fiscal|tribut/.test(s)) return 'Fiscal';
  if (/legislat/.test(s)) return 'Legislativa';
  if (/tribunal/.test(s)) return 'Tribunais';
  if (/tecnolog|^ti$/.test(s)) return 'TI';
  if (/control/.test(s)) return 'Controle';
  if (/militar/.test(s)) return 'Militar';
  if (/bancar|banco/.test(s)) return 'Bancária';
  return a;
}
 
// ── FETCH ────────────────────────────────────
async function load() {
  try {
    const r = await fetch(`${API_URL}?action=mapa`);
    const d = await r.json();
    if (d.erro) throw new Error(d.erro);
    all = (d.registros||[]).map((r,i) => ({
      id:           r.id || i+1,
      // Suporta tanto o formato da aba Consolidado quanto das abas mensais
      orgao:        r.orgao || r['Nome'] || r['Concurso'] || '',
      esfera:       r.esfera || (r.estado==='NAC'||r['UF']==='NAC' ? 'Federal' : 'Estadual'),
      estado:       r.estado || r['UF'] || '',
      cidade:       r.cidade || '',
      lat:          parseFloat(r.lat || r['lat']) || 0,
      lng:          parseFloat(r.lng || r['lng']) || 0,
      salario:      r.salario || r['R$ Final (Teto)'] || r['$ final'] || r['R$ inicial'] || '',
      vagas:        parseInt(r.vagas || r['Vagas']) || 0,
      inscricao_fim:r.inscricao_fim || r['Inscrições até'] || r['Data da prova'] || r['Data da objetiva'] || '',
      cargo:        r.cargo || r['Cargos'] || '',
      banca:        r.banca || r['Banca - Edital vigente'] || r['Banca'] || '',
      area:         r.area || r['Carreira Macro'] || r['Carreiras'] || '',
      situacao:     r.situacao || r['Situação'] || '',
      url:          r.url || r['URL Eterna'] || r['Link do edital'] || '',
      url_blog:     r.url_blog || '',
      url_curso:    r.url_curso || '',
    })).filter(r => r.orgao && (r.lat || r.estado));
    document.getElementById('h-total').textContent   = fmt(all.length);
    document.getElementById('h-abertos').textContent = all.filter(c => sitClass(c.situacao)==='aberto').length;
    renderMap();
  } catch(e) {
    console.error(e);
    document.getElementById('h-total').textContent = 'Erro ao carregar';
  }
}
 
// ── FILTER ───────────────────────────────────
function filtered() {
  return all.filter(c => {
    // situação
    if (filters.situacoes.length) {
      if (!filters.situacoes.includes(sitClass(c.situacao))) return false;
    }
    // área
    if (filters.areas.length) {
      if (!filters.areas.includes(normArea(c.area))) return false;
    }
    // uf
    if (filters.uf !== 'all' && c.estado !== filters.uf) return false;
    // busca
    if (filters.search) {
      const h = [c.orgao,c.cargo,c.cidade,c.estado].map(x=>(x||'').toLowerCase()).join(' ');
      if (!h.includes(filters.search)) return false;
    }
    return c.lat && c.lng;
  });
}
 
// ── MAP ──────────────────────────────────────
function initMap() {
  const bounds = L.latLngBounds(L.latLng(-35,-74), L.latLng(6,-28));
  map = L.map('map', {
    center: [-14.235,-51.9253], zoom: 4,
    minZoom: 4, maxZoom: 14,
    maxBounds: bounds, maxBoundsViscosity: 0.8,
    zoomControl: true,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 14, attribution: '© OpenStreetMap © CARTO'
  }).addTo(map);
  map.fitBounds(bounds, {padding:[20,20]});
 
  // Brasil border
  fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson')
    .then(r=>r.json())
    .then(data => {
      L.geoJSON(data, {
        style: { color:'#c8d0e0', weight:0.8, fillOpacity:0, opacity:1 },
        interactive: false
      }).addTo(map);
    }).catch(()=>{});
}
 
function renderMap() {
  if (cluster) { map.removeLayer(cluster); cluster = null; }
 
  const data = filtered();
 
  cluster = L.markerClusterGroup({
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    iconCreateFunction(cl) {
      const ch  = cl.getAllChildMarkers();
      const n   = ch.length;
      // cor dominante do grupo
      const sitCounts = {};
      ch.forEach(m => { const s = m.options.sit||'outros'; sitCounts[s]=(sitCounts[s]||0)+1; });
      const dom = Object.entries(sitCounts).sort((a,b)=>b[1]-a[1])[0][0];
      const color = dom==='aberto'?'#3BAE8A':dom==='previsto'?'#4B7BE5':dom==='encerrado'?'#9b2226':'#1e40af';
      const sz = Math.min(72, Math.max(30, 26 + Math.sqrt(n)*5));
      const fs = sz>=52?14:sz>=38?12:10;
      return L.divIcon({
        html:`<div style="
          width:${sz}px;height:${sz}px;
          background:${color};
          border-radius:50%;
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          font-family:'Inter',sans-serif;font-weight:700;color:white;
          box-shadow:0 3px 18px ${color}60;
          border:3px solid rgba(255,255,255,0.85);
          cursor:pointer;
        ">
          <span style="font-size:${fs}px;line-height:1.15">${n}</span>
        </div>`,
        className:'cluster-icon',
        iconSize:[sz,sz],
        iconAnchor:[sz/2,sz/2],
      });
    }
  });
 
  data.forEach(c => {
    const color = sitColor(c.situacao);
    const sz = 14;
    const ico = L.divIcon({
      html:`<div style="
        width:${sz}px;height:${sz}px;
        background:${color};
        border-radius:50%;
        border:2.5px solid rgba(255,255,255,0.9);
        box-shadow:0 1px 6px ${color}80;
        cursor:pointer;
      "></div>`,
      className:'leaflet-div-icon-clean',
      iconSize:[sz,sz], iconAnchor:[sz/2,sz/2],
    });
    const m = L.marker([+c.lat,+c.lng], { icon:ico, sit:sitClass(c.situacao) });
    m.on('click', () => openCard(c));
    cluster.addLayer(m);
  });
 
  map.addLayer(cluster);
}
 
// ── CARD ─────────────────────────────────────
function openCard(c) {
  closeFilters();
  const sc = sitClass(c.situacao);
  const scLabel = sc==='aberto'?'Inscrições abertas':sc==='encerrado'?'Inscrições encerradas':sc==='previsto'?'Edital em breve':'Sem previsão';
  const area = normArea(c.area);
 
  // tags
  document.getElementById('cp-tags').innerHTML =
    `<span class="cp-tag ${sc}">${scLabel}</span>` +
    (area ? `<span class="cp-tag area">${area}</span>` : '');
 
  // title + org
  document.getElementById('cp-title').textContent = c.orgao || '—';
  document.getElementById('cp-org').textContent   = c.banca || '';
 
  // info grid
  const local = c.cidade ? `${c.cidade} - ${c.estado}` : c.estado || '—';
  document.getElementById('cp-info').innerHTML = `
    <div class="cp-info-item">
      <div class="cp-info-icon">👥</div>
      <div><div class="cp-info-label">Vagas</div><div class="cp-info-value">${fmt(c.vagas)||'—'}</div></div>
    </div>
    <div class="cp-info-item">
      <div class="cp-info-icon">💰</div>
      <div><div class="cp-info-label">Salário</div><div class="cp-info-value">${c.salario||'—'}</div></div>
    </div>
    <div class="cp-info-item">
      <div class="cp-info-icon">📅</div>
      <div><div class="cp-info-label">Inscrições até</div><div class="cp-info-value">${fd(c.inscricao_fim)}</div></div>
    </div>
    <div class="cp-info-item">
      <div class="cp-info-icon">📍</div>
      <div><div class="cp-info-label">Local</div><div class="cp-info-value">${local}</div></div>
    </div>
  `;
 
  // article card
  const art = document.getElementById('cp-article');
  if (c.url_blog || c.url) {
    const link = c.url_blog || c.url;
    art.style.display = 'flex';
    art.innerHTML = `
      <div class="cp-article-icon">📋</div>
      <div style="flex:1">
        <div class="cp-article-label">Artigo Completo</div>
        <div class="cp-article-title">Veja todas as informações sobre ${c.orgao}</div>
        <a class="cp-btn" href="${link}" target="_blank">↗ VER MAIS</a>
      </div>
    `;
  } else {
    art.style.display = 'none';
  }
 
  document.getElementById('card-popup').classList.add('open');
}
 
function closeCard() {
  document.getElementById('card-popup').classList.remove('open');
}
 
// ── FILTERS ──────────────────────────────────
function toggleFilters() {
  const panel = document.getElementById('filter-panel');
  const btn   = document.getElementById('filter-btn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('active', open);
  if (open) closeCard();
}
 
function closeFilters() {
  document.getElementById('filter-panel').classList.remove('open');
  document.getElementById('filter-btn').classList.remove('active');
}
 
function updateFilters() {
  // situações
  filters.situacoes = Array.from(document.querySelectorAll('.fp-check input:checked'))
    .map(el => el.value)
    .filter(v => ['aberto','previsto','encerrado','outros'].includes(v));
 
  // áreas
  filters.areas = Array.from(document.querySelectorAll('.fp-check input:checked'))
    .map(el => el.value)
    .filter(v => !['aberto','previsto','encerrado','outros'].includes(v));
 
  // uf
  filters.uf = document.getElementById('fp-uf').value;
 
  renderMap();
}
 
// ── SEARCH ───────────────────────────────────
let st;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => {
    filters.search = e.target.value.toLowerCase().trim();
    renderMap();
  }, 250);
});
 
// ── BOOT ─────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  load();
});
</script>
</body>
</html>
